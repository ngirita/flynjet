{% extends 'base.html' %}
{% load static %}

{% block title %}Login Error - FlynJet{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-danger text-white text-center py-4">
                    <i class="fas fa-exclamation-triangle fa-3x mb-2"></i>
                    <h3 class="mb-0">Authentication Error</h3>
                </div>
                <div class="card-body p-5 text-center">
                    <p class="lead mb-4">
                        There was a problem signing in with your social account.
                    </p>
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        Please try again or use a different login method.
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                            <i class="fas fa-arrow-left me-2"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
