<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block email_title %}FlynJet{% endblock %}</title>
    <style>
        /* Email styles - inline CSS for compatibility */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 32px;
        }
        .content {
            padding: 30px 20px;
        }
        .button {
            display: inline-block;
            padding: 12px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin: 20px 0;
        }
        .footer {
            padding: 20px;
            text-align: center;
            background-color: #333;
            color: white;
            font-size: 12px;
        }
        .footer a {
            color: #ccc;
            text-decoration: underline;
        }
        @media only screen and (max-width: 600px) {
            .container {
                width: 100%;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{% block email_header %}FlynJet{% endblock %}</h1>
        </div>
        
        <div class="content">
            {% block email_content %}{% endblock %}
        </div>
        
        <div class="footer">
            <p>&copy; {% now "Y" %} FlynJet. All rights reserved.</p>
            <p>
                <a href="{{ site_url }}">Visit our website</a>
            </p>
        </div>
    </div>
</body>
</html>
