{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FlynJet{% endblock %}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="ajax-body">
    <div id="ajax-content">
        {% block content %}{% endblock %}
    </div>
    
    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
    
    <script>
        // Handle AJAX form submissions
        $(document).on('submit', '.ajax-form', function(e) {
            e.preventDefault();
            const form = $(this);
            
            $.ajax({
                url: form.attr('action'),
                method: form.attr('method') || 'POST',
                data: form.serialize(),
                success: function(response) {
                    if (response.redirect) {
                        window.location.href = response.redirect;
                    } else if (response.html) {
                        $('#ajax-content').html(response.html);
                    }
                    
                    // Trigger event
                    $(document).trigger('ajax:success', response);
                },
                error: function(xhr) {
                    const response = xhr.responseJSON;
                    if (response && response.errors) {
                        // Display errors
                        for (let field in response.errors) {
                            const input = form.find(`[name="${field}"]`);
                            input.addClass('is-invalid');
                            input.after(`<div class="invalid-feedback">${response.errors[field]}</div>`);
                        }
                    }
                    
                    // Trigger event
                    $(document).trigger('ajax:error', xhr);
                }
            });
        });
        
        // Handle AJAX links
        $(document).on('click', '.ajax-link', function(e) {
            e.preventDefault();
            const link = $(this);
            
            $.get(link.attr('href'), function(html) {
                $('#ajax-content').html(html);
                history.pushState(null, '', link.attr('href'));
            });
        });
        
        // Handle popstate
        window.addEventListener('popstate', function() {
            $.get(window.location.href, function(html) {
                $('#ajax-content').html(html);
            });
        });
    </script>
</body>
</html>
