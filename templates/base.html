<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FlynJet - Private Jet Charter{% endblock %}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <style>
        /* Base Select2 styles - works for all forms */
        .select2-container {
            position: relative;
            display: inline-block;
            vertical-align: middle;
            width: 100% !important;
        }
        
        .select2-container--open {
            z-index: 9999;
        }
        
        /* Default dropdown positioning */
        .select2-container--open .select2-dropdown {
            position: absolute;
            top: 100% !important;
            left: 0 !important;
            margin-top: 4px !important;
            min-width: 300px !important;
            width: auto !important;
        }
        
        /* ========== QUICK BOOKING FORM SPECIFIC STYLES ========== */
        .booking-form-section .select2-container {
            position: relative !important;
        }
        
        .booking-form-section .select2-container--open .select2-dropdown {
            min-width: 0 !important;
            width: 100% !important;
            left: 0 !important;
            right: auto !important;
        }
        
        .booking-form-section .select2-dropdown {
            max-width: 100% !important;
        }
        
        .quick-booking-dropdown {
            min-width: 100% !important;
            width: 100% !important;
        }
        
        .quick-booking-dropdown .select2-results__option {
            white-space: normal !important;
            word-wrap: break-word !important;
        }
        
        .booking-card,
        .booking-form-section,
        .booking-form-section .container,
        .booking-form-section .row,
        .booking-form-section .col-lg-11 {
            overflow: visible !important;
        }
        
        .booking-form-section .select2-search--dropdown {
            padding: 8px;
        }
        
        .booking-form-section .select2-search__field {
            width: 100% !important;
            padding: 8px 12px !important;
            border-radius: 8px !important;
        }
        
        /* Select2 dropdown styles */
        .select2-dropdown {
            background-color: #ffffff;
            border-color: #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .select2-results__options {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .select2-results__option {
            padding: 10px 15px;
            cursor: pointer;
            color: #333333;
        }
        
        .select2-results__option--highlighted {
            background-color: #c5a059;
            color: #ffffff;
        }
        
        @media (max-width: 768px) {
            .booking-form-section .select2-container--open .select2-dropdown {
                max-width: calc(100vw - 40px) !important;
                min-width: 280px !important;
            }
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Header -->
    {% include 'includes/header.html' %}
    
    <!-- Messages -->
    {% include 'includes/messages.html' %}
    
    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    {% include 'includes/footer.html' %}
    
    <!-- Floating Chat Widget -->
    <!-- Floating Chat Widget -->
    <!-- Temporarily disabled until WhatsApp API integration -->
    <!-- {% include 'chat/floating_chat.html' %} -->
    
    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/airport-autocomplete.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
