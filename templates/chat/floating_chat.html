{% load static %}

<div id="flynjet-chat-widget" class="chat-widget-container">
    <!-- Floating Chat Button -->
    <div class="chat-button" id="chatButton" onclick="checkAuthAndToggle()">
        <i class="fas fa-comment-dots"></i>
        <span class="chat-notification-badge" id="chatNotificationBadge" style="display: none;">1</span>
    </div>

    <!-- Chat Window -->
    <div class="chat-window" id="chatWindow">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <i class="fas fa-headset"></i>
                <div>
                    <h6 class="mb-0">FlynJet Support</h6>
                    <small>Typically replies in minutes</small>
                </div>
            </div>
            <div class="chat-header-actions">
                <!-- ===== ADDED: End Chat button ===== -->
                <button class="end-chat-btn" id="endChatBtn" onclick="endChatConversation()" 
                        title="End conversation" style="display: none;">
                    <i class="fas fa-stop-circle"></i>
                </button>
                <button class="remove-to-header" id="removeToHeaderBtn" onclick="removeChatToHeader()" title="Remove to header">
                    <i class="fas fa-times"></i>
                </button>
                <button class="clear-chat" onclick="clearChat()" title="Clear conversation">
                    <i class="fas fa-trash-alt"></i>
                </button>
                <button class="minimize-chat" onclick="toggleChatWidget()">
                    <i class="fas fa-minus"></i>
                </button>
            </div>
        </div>

        <!-- FIXED: Removed the hardcoded static welcome message that was here.
             The welcome message is now saved to the DB in init_chat (views.py)
             and replayed via the WebSocket 'history' event when the socket
             connects.  Having both caused the user to see two welcome messages
             every time they opened the chat. -->
        <div class="chat-messages" id="chatMessages">
            <!-- Messages are populated by handleChatMessage() on 'history' -->
        </div>

        <div class="chat-typing" id="chatTyping" style="display: none;">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span>FlynJet is typing...</span>
        </div>

        <div class="chat-input-area">
            <div class="suggestions-row" id="suggestionsRow" style="display: none;">
                <div class="suggestions-container" id="suggestionsContainer"></div>
            </div>
            <div class="input-group">
                <textarea id="chatInput" rows="1" placeholder="Type your message..."
                          onkeypress="handleChatKeyPress(event)"></textarea>
                <button class="send-btn" onclick="sendChatMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="chat-footer">
                <small>Powered by FlynJet AI Assistant</small>
            </div>
        </div>
    </div>
</div>

<style>
    .chat-widget-container {
        position: fixed;
        z-index: 1000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        bottom: 20px;
        right: 20px;
        left: auto;
        top: auto;
        transition: none;
    }

    .chat-widget-container.dragging {
        transition: none;
        cursor: grabbing;
    }

    .chat-button {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        transition: all 0.3s ease;
        position: relative;
    }

    .chat-button[draggable="true"] { cursor: grab; }
    .chat-button[draggable="true"]:active { cursor: grabbing; }

    .chat-button:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 25px rgba(0,0,0,0.2);
    }

    .chat-button i { color: white; font-size: 24px; }

    .chat-notification-badge {
        position: absolute;
        top: -5px;
        right: -5px;
        background: #ff4444;
        color: white;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
    }

    .chat-window {
        position: absolute;
        width: 380px;
        height: 460px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        display: none;
        flex-direction: column;
        overflow: hidden;
        animation: fadeIn 0.3s ease;
    }

    .chat-window.position-bottom { bottom: 80px; right: 0; top: auto; }
    .chat-window.position-top    { top: 80px; right: 0; bottom: auto; }
    .chat-window.active          { display: flex; }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to   { opacity: 1; transform: scale(1); }
    }

    .chat-header.draggable        { cursor: grab; }
    .chat-header.draggable:active { cursor: grabbing; }

    .chat-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
    }

    .chat-header-info {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
    }

    .chat-header-info i  { font-size: 24px; }
    .chat-header-info h6 { margin: 0; font-weight: 600; }
    .chat-header-info small { font-size: 11px; opacity: 0.9; }

    .chat-header-actions { display: flex; gap: 8px; align-items: center; }

    .remove-to-header,
    .clear-chat,
    .minimize-chat {
        background: none;
        border: none;
        color: rgba(255,255,255,0.8);
        cursor: pointer;
        font-size: 16px;
        padding: 5px;
        transition: all 0.3s ease;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .remove-to-header:hover { background: rgba(255,255,255,0.2); color: #ffaaaa; transform: scale(1.05); }
    .clear-chat:hover        { background: rgba(255,255,255,0.2); color: #ffaaaa; transform: scale(1.05); }
    .minimize-chat:hover     { background: rgba(255,255,255,0.2); transform: scale(1.05); }

    /* ===== ADDED: CSS for end chat button ===== */
    .end-chat-btn {
        background: none;
        border: none;
        color: rgba(255,255,255,0.8);
        cursor: pointer;
        font-size: 16px;
        padding: 5px;
        transition: all 0.3s ease;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .end-chat-btn:hover {
        background: rgba(255,255,255,0.2);
        color: #ffaaaa;
        transform: scale(1.05);
    }

    /* ===== ADDED: Rating Modal Styles ===== */
    .rating-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
    }

    .rating-modal-content {
        background: white;
        border-radius: 16px;
        padding: 24px;
        width: 320px;
        text-align: center;
        animation: fadeIn 0.3s ease;
    }

    .rating-modal-content h3 {
        margin: 0 0 10px 0;
        color: #333;
    }

    .rating-modal-content .stars {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin: 20px 0;
    }

    .rating-modal-content .star {
        font-size: 32px;
        cursor: pointer;
        color: #ddd;
        transition: color 0.2s;
    }

    .rating-modal-content .star.active,
    .rating-modal-content .star:hover {
        color: #ffc107;
    }

    .rating-modal-content textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        resize: vertical;
        font-family: inherit;
        margin-bottom: 16px;
    }

    .rating-modal-content button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 14px;
    }

    .chat-messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background: #f8f9fa;
        min-height: 0;
    }

    .message         { margin-bottom: 15px; display: flex; }
    .message.sent    { justify-content: flex-end; }
    .message.received { justify-content: flex-start; }

    .message-content {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 12px;
        word-wrap: break-word;
    }

    .message.sent .message-content {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-bottom-right-radius: 4px;
    }

    .message.received .message-content {
        background: white;
        color: #333;
        border-bottom-left-radius: 4px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    .message-time { font-size: 10px; margin-top: 5px; opacity: 0.7; }

    .quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

    .quick-action {
        background: #f1f3f5;
        border: none;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.3s;
    }

    .quick-action:hover { background: #e9ecef; transform: translateY(-1px); }

    .chat-typing {
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-top: 1px solid #e9ecef;
        background: white;
        flex-shrink: 0;
    }

    .typing-dots { display: flex; gap: 4px; }

    .typing-dots span {
        width: 8px;
        height: 8px;
        background: #667eea;
        border-radius: 50%;
        animation: typingBounce 1.4s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
        0%, 60%, 100% { transform: translateY(0); }
        30%            { transform: translateY(-8px); }
    }

    .chat-input-area {
        padding: 15px 20px;
        border-top: 1px solid #e9ecef;
        background: white;
        flex-shrink: 0;
    }

    .suggestions-row { margin-bottom: 10px; }

    .suggestions-container { display: flex; gap: 8px; flex-wrap: wrap; }

    .suggestion-chip {
        background: #f1f3f5;
        border: none;
        padding: 5px 12px;
        border-radius: 15px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .suggestion-chip:hover { background: #e9ecef; transform: translateY(-1px); }

    .input-group { display: flex; gap: 10px; align-items: flex-end; }

    .input-group textarea {
        flex: 1;
        border: 1px solid #e0e0e0;
        border-radius: 20px;
        padding: 10px 15px;
        resize: none;
        font-family: inherit;
        font-size: 14px;
        max-height: 100px;
        transition: border-color 0.3s;
    }

    .input-group textarea:focus { outline: none; border-color: #667eea; }

    .send-btn {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 50%;
        color: white;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .send-btn:hover { transform: scale(1.05); }

    .chat-footer { text-align: center; margin-top: 10px; font-size: 10px; color: #999; }

    .chat-messages::-webkit-scrollbar       { width: 5px; }
    .chat-messages::-webkit-scrollbar-track { background: #f1f1f1; }
    .chat-messages::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 5px; }
    .chat-messages::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

    @media (max-width: 480px) {
        .chat-window { width: calc(100vw - 40px); height: 410px; }
        .chat-window.position-bottom,
        .chat-window.position-top { right: 20px; }
    }
</style>

<script>
    // ========== REMOVE-TO-HEADER ==========
    let isChatRemovedToHeader = false;

    function removeChatToHeader() {
        document.getElementById('flynjet-chat-widget').style.display = 'none';
        isChatRemovedToHeader = true;

        const headerChatIcon = document.getElementById('headerChatIcon');
        if (headerChatIcon) headerChatIcon.style.display = 'flex';

        document.getElementById('chatWindow').classList.remove('active');
    }

    function restoreChatFromHeader() {
        document.getElementById('flynjet-chat-widget').style.display = 'block';
        isChatRemovedToHeader = false;

        const headerChatIcon = document.getElementById('headerChatIcon');
        if (headerChatIcon) headerChatIcon.style.display = 'none';

        document.getElementById('chatWindow').classList.add('active');
        adjustChatWindowPosition();
        document.getElementById('chatNotificationBadge').style.display = 'none';
    }

    // ========== AUTH CHECK ==========
    function checkAuthAndToggle() {
        const isAuthenticated = {{ user.is_authenticated|lower }};

        if (!isAuthenticated) {
            if (confirm('Please log in to use chat support. Would you like to log in now?')) {
                window.location.href = "{% url 'accounts:login' %}?next={{ request.path }}";
            }
            return;
        }

        if (isChatRemovedToHeader) {
            restoreChatFromHeader();
        } else {
            toggleChatWidget();
        }
    }

    // ========== WINDOW POSITIONING ==========
    function adjustChatWindowPosition() {
        const widget     = document.getElementById('flynjet-chat-widget');
        const chatWindow = document.getElementById('chatWindow');
        const chatButton = document.getElementById('chatButton');

        if (!widget || !chatWindow || !chatButton) return;

        const buttonRect      = chatButton.getBoundingClientRect();
        const windowHeight    = window.innerHeight;
        const chatWindowHeight = 460;
        const margin          = 15;

        chatWindow.classList.remove('position-bottom', 'position-top');
        chatWindow.style.top    = '';
        chatWindow.style.bottom = '';
        chatWindow.style.right  = '0px';

        if (buttonRect.top >= chatWindowHeight + margin) {
            chatWindow.classList.add('position-top');
            chatWindow.style.top = (buttonRect.top - chatWindowHeight - margin) + 'px';
        } else if (windowHeight - buttonRect.bottom >= chatWindowHeight + margin) {
            chatWindow.classList.add('position-bottom');
            chatWindow.style.top = (buttonRect.bottom + margin) + 'px';
        } else {
            chatWindow.classList.add('position-top');
            let topPos = Math.max(margin, buttonRect.top - chatWindowHeight - margin);
            if (topPos + chatWindowHeight > windowHeight - margin) {
                topPos = windowHeight - chatWindowHeight - margin;
            }
            chatWindow.style.top = topPos + 'px';
        }
    }

    // ========== DRAG TO MOVE ==========
    (function () {
        const widget     = document.getElementById('flynjet-chat-widget');
        const chatButton = document.getElementById('chatButton');
        const chatHeader = document.getElementById('chatHeader');
        const chatWindow = document.getElementById('chatWindow');

        let isDragging = false, dragStartX = 0, dragStartY = 0, startLeft = 0, startTop = 0;

        function initPosition() {
            const rect = widget.getBoundingClientRect();
            widget.style.left   = rect.left + 'px';
            widget.style.top    = rect.top  + 'px';
            widget.style.bottom = 'auto';
            widget.style.right  = 'auto';
        }

        function startDrag(e) {
            if (e.target.closest('.chat-header-actions')) return;
            e.preventDefault();
            if (widget.style.bottom !== 'auto') initPosition();

            const rect = widget.getBoundingClientRect();
            startLeft  = rect.left;
            startTop   = rect.top;

            const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);

            dragStartX = clientX - startLeft;
            dragStartY = clientY - startTop;
            isDragging = true;
            widget.classList.add('dragging');
        }

        function onDrag(e) {
            if (!isDragging) return;
            e.preventDefault();

            const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);

            const viewportWidth  = window.innerWidth;
            const viewportHeight = window.innerHeight;
            const widgetRect     = widget.getBoundingClientRect();

            let newLeft = Math.max(0, Math.min(clientX - dragStartX, viewportWidth  - widgetRect.width));
            let newTop  = Math.max(0, Math.min(clientY - dragStartY, viewportHeight - widgetRect.height));

            widget.style.left = newLeft + 'px';
            widget.style.top  = newTop  + 'px';

            if (chatWindow.classList.contains('active')) adjustChatWindowPosition();
        }

        function stopDrag() {
            if (!isDragging) return;
            isDragging = false;
            widget.classList.remove('dragging');
            try {
                localStorage.setItem('chatWidgetLeft', widget.style.left);
                localStorage.setItem('chatWidgetTop',  widget.style.top);
            } catch (err) {}
        }

        function restorePosition() {
            try {
                const savedLeft = localStorage.getItem('chatWidgetLeft');
                const savedTop  = localStorage.getItem('chatWidgetTop');
                if (savedLeft && savedTop) {
                    widget.style.left   = savedLeft;
                    widget.style.top    = savedTop;
                    widget.style.bottom = 'auto';
                    widget.style.right  = 'auto';
                } else {
                    initPosition();
                }
            } catch (err) { initPosition(); }
        }

        chatButton.setAttribute('draggable', 'true');
        chatButton.addEventListener('dragstart', e => { e.preventDefault(); return false; });
        chatButton.addEventListener('mousedown', startDrag);
        chatButton.addEventListener('touchstart', startDrag, { passive: false });

        chatHeader.classList.add('draggable');
        chatHeader.addEventListener('mousedown', startDrag);
        chatHeader.addEventListener('touchstart', startDrag, { passive: false });

        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup',   stopDrag);
        document.addEventListener('touchmove', onDrag, { passive: false });
        document.addEventListener('touchend',  stopDrag);

        restorePosition();

        window.addEventListener('resize', function () {
            if (isDragging) return;
            const rect         = widget.getBoundingClientRect();
            const viewportWidth  = window.innerWidth;
            const viewportHeight = window.innerHeight;
            let newLeft = Math.max(0, Math.min(rect.left, viewportWidth  - rect.width));
            let newTop  = Math.max(0, Math.min(rect.top,  viewportHeight - rect.height));
            if (newLeft !== rect.left || newTop !== rect.top) {
                widget.style.left = newLeft + 'px';
                widget.style.top  = newTop  + 'px';
                try {
                    localStorage.setItem('chatWidgetLeft', widget.style.left);
                    localStorage.setItem('chatWidgetTop',  widget.style.top);
                } catch (err) {}
            }
            if (chatWindow.classList.contains('active')) adjustChatWindowPosition();
        });
    })();

    // ========== CHAT STATE ==========
    let chatSocket       = null;
    let conversationId   = null;
    let typingTimeout    = null;
    let isTypingActive   = false;
    let pendingMessageIds = new Set();

    function generateMessageId() {
        return Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            for (const cookie of document.cookie.split(';')) {
                const c = cookie.trim();
                if (c.startsWith(name + '=')) {
                    cookieValue = decodeURIComponent(c.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function clearChat() {
        if (!confirm('Are you sure you want to clear the conversation? This action cannot be undone.')) return;

        document.getElementById('chatMessages').innerHTML = '';
        pendingMessageIds.clear();

        if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
            chatSocket.send(JSON.stringify({ type: 'clear_chat' }));
        }
    }

    // ========== INIT CHAT ==========
    async function initChat() {
        const isAuthenticated = {{ user.is_authenticated|lower }};
        if (!isAuthenticated) return;

        try {
            const response = await fetch('/chat/api/init/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });

            const data = await response.json();
            conversationId = data.conversation_id;

            // Show suggestions returned by the API (from the welcome message)
            if (data.suggestions && data.suggestions.length > 0) {
                showSuggestions(data.suggestions);
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            chatSocket = new WebSocket(`${protocol}//${window.location.host}/ws/chat/${conversationId}/`);

            chatSocket.onopen    = () => console.log('Chat connected');
            chatSocket.onmessage = (event) => handleChatMessage(JSON.parse(event.data));
            chatSocket.onclose   = () => setTimeout(initChat, 3000);

        } catch (error) {
            console.error('Failed to initialize chat:', error);
        }
    }

    function toggleChatWidget() {
        const chatWindow = document.getElementById('chatWindow');
        const isActive   = chatWindow.classList.contains('active');

        if (!isActive) {
            chatWindow.classList.add('active');
            adjustChatWindowPosition();
            if (!chatSocket && !conversationId) initChat();
            document.getElementById('chatNotificationBadge').style.display = 'none';
        } else {
            chatWindow.classList.remove('active');
        }
    }

    // ========== SEND MESSAGE ==========
    function sendChatMessage() {
        const input   = document.getElementById('chatInput');
        const message = input.value.trim();

        if (!message || !chatSocket || chatSocket.readyState !== WebSocket.OPEN) return;

        const messageId = generateMessageId();
        pendingMessageIds.add(messageId);

        displayMessage(message, 'sent', 'You');

        chatSocket.send(JSON.stringify({ type: 'message', message, client_id: messageId }));

        input.value       = '';
        input.style.height = 'auto';

        setTimeout(() => pendingMessageIds.delete(messageId), 5000);

        if (typingTimeout) clearTimeout(typingTimeout);
        if (isTypingActive) {
            chatSocket.send(JSON.stringify({ type: 'typing', is_typing: false }));
            isTypingActive = false;
        }
    }

    function sendQuickMessage(message) {
        document.getElementById('chatInput').value = message;
        sendChatMessage();
    }

    function handleChatKeyPress(event) {
        const input = document.getElementById('chatInput');

        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendChatMessage();
            return;
        }

        if (chatSocket && chatSocket.readyState === WebSocket.OPEN && !isTypingActive) {
            isTypingActive = true;
            chatSocket.send(JSON.stringify({ type: 'typing', is_typing: true }));
        }

        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            if (chatSocket && chatSocket.readyState === WebSocket.OPEN && isTypingActive) {
                chatSocket.send(JSON.stringify({ type: 'typing', is_typing: false }));
                isTypingActive = false;
            }
        }, 2000);

        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    }

    // ========== DISPLAY ==========
    function displayMessage(message, type, senderName, timestamp = null) {
        const container  = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${type}`;

        const time = timestamp
            ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        let displayName = senderName;
        if (type === 'sent') displayName = 'You';
        else if (!displayName)  displayName = 'FlynJet Support';

        messageDiv.innerHTML = `
            <div class="message-content">
                <strong>${escapeHtml(displayName)}</strong><br>
                ${escapeHtml(message)}
                <div class="message-time">${time}</div>
            </div>
        `;

        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ===== ADDED: endChatConversation function =====
    async function endChatConversation() {
        if (!conversationId) {
            alert('No active conversation to end');
            return;
        }
        
        if (confirm('Are you sure you want to end this conversation? You can start a new one anytime.')) {
            try {
                const response = await fetch(`/chat/api/end-chat/${conversationId}/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    }
                });
                
                if (response.ok) {
                    // Show ended message
                    const container = document.getElementById('chatMessages');
                    const endDiv = document.createElement('div');
                    endDiv.className = 'message received';
                    endDiv.innerHTML = `
                        <div class="message-content" style="background: #f8d7da; color: #721c24; text-align: center;">
                            <strong>Conversation Ended</strong><br>
                            This conversation has been ended. You can start a new conversation anytime.
                        </div>
                    `;
                    container.appendChild(endDiv);
                    
                    // Disable input
                    document.getElementById('chatInput').disabled = true;
                    document.querySelector('.send-btn').disabled = true;
                    
                    // Close WebSocket
                    if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
                        chatSocket.close();
                    }
                    
                    // Hide end chat button
                    document.getElementById('endChatBtn').style.display = 'none';
                    
                    // Reset conversation ID after a delay
                    setTimeout(() => {
                        conversationId = null;
                        document.getElementById('chatInput').disabled = false;
                        document.querySelector('.send-btn').disabled = false;
                        // Will create new conversation on next message
                    }, 3000);
                } else {
                    alert('Failed to end conversation. Please try again.');
                }
            } catch (error) {
                console.error('Error ending conversation:', error);
                alert('Error ending conversation. Please try again.');
            }
        }
    }

    // ===== ADDED: Rating modal handling =====
    let currentRatingConversationId = null;
    let selectedRating = 0;

    function showRatingModal(conversationId, message) {
        currentRatingConversationId = conversationId;
        selectedRating = 0;
        
        const modalHtml = `
            <div id="ratingModal" class="rating-modal">
                <div class="rating-modal-content">
                    <h3>Rate Your Experience</h3>
                    <p>${message || 'How would you rate your support experience?'}</p>
                    <div class="stars">
                        ${[1,2,3,4,5].map(i => `<span class="star" data-rating="${i}">★</span>`).join('')}
                    </div>
                    <textarea id="ratingFeedback" rows="3" placeholder="Additional feedback (optional)"></textarea>
                    <button onclick="submitRatingFromModal()">Submit Rating</button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        // Star click handlers
        document.querySelectorAll('.star').forEach(star => {
            star.addEventListener('click', function() {
                const rating = parseInt(this.dataset.rating);
                selectedRating = rating;
                document.querySelectorAll('.star').forEach(s => {
                    const starRating = parseInt(s.dataset.rating);
                    if (starRating <= rating) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
            });
        });
    }

    async function submitRatingFromModal() {
        if (selectedRating === 0) {
            alert('Please select a rating');
            return;
        }
        
        const feedback = document.getElementById('ratingFeedback').value;
        
        try {
            const response = await fetch(`/chat/api/submit-rating/${currentRatingConversationId}/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    rating: selectedRating,
                    feedback: feedback
                })
            });
            
            if (response.ok) {
                document.getElementById('ratingModal').remove();
                displayMessage('Thank you for your feedback! How else can I help you?', 'received', 'FlynJet Assistant');
                
                // Re-enable input if it was disabled
                document.getElementById('chatInput').disabled = false;
                document.querySelector('.send-btn').disabled = false;
            } else {
                alert('Failed to submit rating. Please try again.');
            }
        } catch (error) {
            console.error('Error submitting rating:', error);
            alert('Error submitting rating. Please try again.');
        }
    }

    // ===== UPDATED: handleChatMessage function =====
    function handleChatMessage(data) {
        if (data.type === 'message') {
            // Suppress echo of our own messages (already shown optimistically)
            if (data.data.client_id && pendingMessageIds.has(data.data.client_id)) return;

            let senderName = data.data.sender_name;
            if (data.data.is_ai)    senderName = 'FlynJet Assistant';
            else if (data.data.is_agent) senderName = 'FlynJet Support';

            displayMessage(data.data.message, 'received', senderName, data.data.timestamp);

            // Show end chat button if conversation is active
            if (conversationId) {
                document.getElementById('endChatBtn').style.display = 'flex';
            }

            const chatWindow = document.getElementById('chatWindow');
            if (!chatWindow.classList.contains('active') && !isChatRemovedToHeader) {
                document.getElementById('chatNotificationBadge').style.display = 'flex';
            } else if (isChatRemovedToHeader) {
                const headerBadge = document.getElementById('headerNotificationBadge');
                if (headerBadge) headerBadge.style.display = 'flex';
            }

        } else if (data.type === 'typing') {
            document.getElementById('chatTyping').style.display = data.is_typing ? 'flex' : 'none';

        } else if (data.type === 'suggestions') {
            showSuggestions(data.suggestions);

        } else if (data.type === 'history') {
            // FIXED: No longer hiding a static welcome element — it doesn't exist.
            // Just render every message from history directly.
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';   // clear any stale content

            data.messages.forEach(msg => {
                if (msg.is_ai) {
                    displayMessage(msg.message, 'received', 'FlynJet Assistant', msg.timestamp);

                    // Re-show suggestions from the last AI message in history
                    // so the user has quick-reply chips when they open the widget
                    if (msg.suggested_responses && msg.suggested_responses.length > 0) {
                        showSuggestions(msg.suggested_responses);
                    }
                } else if (msg.is_agent) {
                    displayMessage(msg.message, 'received', 'FlynJet Support', msg.timestamp);
                } else {
                    displayMessage(msg.message, 'sent', 'You', msg.timestamp);
                }
            });

        } else if (data.type === 'queue_update') {
            displayMessage(
                data.message || 'You are in the queue. Please wait...',
                'received', 'FlynJet Support'
            );

        } else if (data.type === 'switch_to_ai_confirmed') {
            displayMessage(
                'You are now connected to the AI assistant. How can I help you?',
                'received', 'FlynJet Assistant'
            );

        } else if (data.type === 'chat_ended') {
            displayMessage(
                data.message || 'This conversation has ended.',
                'received', 'FlynJet Support'
            );
            
            // Disable input
            document.getElementById('chatInput').disabled = true;
            document.querySelector('.send-btn').disabled = true;
            document.getElementById('endChatBtn').style.display = 'none';
            
            // Re-enable after delay
            setTimeout(() => {
                document.getElementById('chatInput').disabled = false;
                document.querySelector('.send-btn').disabled = false;
                conversationId = null;
            }, 3000);
        
        // ===== ADDED: Handle request_rating =====
        } else if (data.type === 'request_rating') {
            showRatingModal(data.conversation_id, data.message);
        }
    }

    function showSuggestions(suggestions) {
        const suggestionsRow       = document.getElementById('suggestionsRow');
        const suggestionsContainer = document.getElementById('suggestionsContainer');

        if (suggestions && suggestions.length > 0) {
            suggestionsContainer.innerHTML = suggestions.map(s => `
                <button class="suggestion-chip"
                        onclick="sendQuickMessage('${s.replace(/'/g, "\\'").replace(/"/g, '&quot;')}')">
                    ${escapeHtml(s)}
                </button>
            `).join('');
            suggestionsRow.style.display = 'block';

            setTimeout(() => { suggestionsRow.style.display = 'none'; }, 10000);
        } else {
            suggestionsRow.style.display = 'none';
        }
    }

    // ========== BOOT ==========
    document.addEventListener('DOMContentLoaded', function () {
        const chatInput = document.getElementById('chatInput');
        if (chatInput) {
            chatInput.addEventListener('input', function () {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 100) + 'px';
            });
        }

        const isAuthenticated = {{ user.is_authenticated|lower }};
        if (isAuthenticated) {
            // Init immediately so the WebSocket is ready when the user opens the chat
            initChat();
        }

        window.addEventListener('resize', function () {
            const chatWindow = document.getElementById('chatWindow');
            if (chatWindow && chatWindow.classList.contains('active')) adjustChatWindowPosition();
        });
    });
</script>
