{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}
<div id="content-main">
    <h1>{{ title }}</h1>
    
    <div class="module">
        <h2>Select Action</h2>
        <form method="post">
            {% csrf_token %}
            
            <div class="form-row">
                <label for="action">Action:</label>
                <select name="action" id="action" class="vTextField">
                    <option value="">Select an action...</option>
                    {% for action in actions %}
                    <option value="{{ action.value }}">{{ action.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-row" id="parameters" style="display: none;">
                <label for="param_value">Parameters:</label>
                <input type="text" name="param_value" id="param_value" class="vTextField">
            </div>
            
            <div class="submit-row">
                <input type="submit" value="Execute" class="default">
                <a href="{% url 'admin:index' %}" class="button">Cancel</a>
            </div>
        </form>
    </div>
    
    <div class="module" id="result" style="display: none;">
        <h2>Result</h2>
        <pre id="result-content"></pre>
    </div>
</div>

<script>
    document.getElementById('action').addEventListener('change', function() {
        const params = document.getElementById('parameters');
        const selected = this.value;
        
        if (selected === 'export_data' || selected === 'send_email') {
            params.style.display = 'block';
        } else {
            params.style.display = 'none';
        }
    });
    
    // Handle form submission
    document.querySelector('form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        
        fetch(window.location.href, {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': formData.get('csrfmiddlewaretoken')
            }
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('result').style.display = 'block';
            document.getElementById('result-content').textContent = JSON.stringify(data, null, 2);
        });
    });
</script>
{% endblock %}
