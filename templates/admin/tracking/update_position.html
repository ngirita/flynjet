<!-- templates/admin/tracking/update_position.html -->
{% extends "admin/base_site.html" %}
{% load static %}

{% block extrahead %}
<link href='https://api.mapbox.com/-gl-js/v2.9.1/mapbox-gl.css' rel='stylesheet' />
<style>
    #map {
        height: 400px;
        margin-bottom: 20px;
        border-radius: 8px;
    }
    .position-form {
        margin-top: 20px;
    }
    .form-row {
        margin-bottom: 15px;
    }
    .form-row label {
        display: inline-block;
        width: 150px;
        font-weight: bold;
    }
    .form-row input {
        width: 200px;
        padding: 5px;
    }
</style>
{% endblock %}

{% block content %}
<div id="content-main">
    <h1>Update Position - {{ track.flight_number }}</h1>
    
    <div id="map"></div>
    
    <form method="post" class="position-form">
        {% csrf_token %}
        
        <div class="module">
            <h2>Current Position</h2>
            
            <div class="form-row">
                <label for="latitude">Latitude:</label>
                <input type="text" name="latitude" id="latitude" value="{{ track.latitude|default:'' }}" required>
            </div>
            
            <div class="form-row">
                <label for="longitude">Longitude:</label>
                <input type="text" name="longitude" id="longitude" value="{{ track.longitude|default:'' }}" required>
            </div>
            
            <div class="form-row">
                <label for="altitude">Altitude (ft):</label>
                <input type="text" name="altitude" id="altitude" value="{{ track.altitude|default:'' }}">
            </div>
            
            <div class="form-row">
                <label for="speed">Speed (kts):</label>
                <input type="text" name="speed" id="speed" value="{{ track.speed|default:'' }}">
            </div>
            
            <div class="form-row">
                <label for="heading">Heading (°):</label>
                <input type="text" name="heading" id="heading" value="{{ track.heading|default:'' }}">
            </div>
        </div>
        
        <div class="submit-row">
            <input type="submit" value="Update Position" class="default">
            <a href="{% url 'admin:tracking_flighttrack_changelist' %}" class="button">Cancel</a>
        </div>
    </form>
</div>

<script src='https://api.mapbox.com/mapbox-gl-js/v2.9.1/mapbox-gl.js'></script>
<script>
    mapboxgl.accessToken = '{{ mapbox_token|default:"pk.your_token" }}';
    
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v11',
        center: [{{ track.longitude|default:"-98.5795" }}, {{ track.latitude|default:"39.8283" }}],
        zoom: 5
    });
    
    let marker = new mapboxgl.Marker({ color: '#dc3545', draggable: true })
        .setLngLat([{{ track.longitude|default:"-98.5795" }}, {{ track.latitude|default:"39.8283" }}])
        .addTo(map);
    
    marker.on('dragend', () => {
        const lngLat = marker.getLngLat();
        document.getElementById('latitude').value = lngLat.lat;
        document.getElementById('longitude').value = lngLat.lng;
    });
    
    map.on('click', (e) => {
        marker.setLngLat(e.lngLat);
        document.getElementById('latitude').value = e.lngLat.lat;
        document.getElementById('longitude').value = e.lngLat.lng;
    });
</script>
{% endblock %}
