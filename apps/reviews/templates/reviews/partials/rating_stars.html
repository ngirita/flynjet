{% load static %}

<div class="rating-stars {% if size %}{{ size }}{% endif %}" 
     {% if rating %}data-rating="{{ rating }}"{% endif %}>
    {% for i in "12345"|make_list %}
        {% if rating %}
            {% if forloop.counter <= rating %}
            <i class="fas fa-star"></i>
            {% elif forloop.counter <= rating|add:"0.5" %}
            <i class="fas fa-star-half-alt"></i>
            {% else %}
            <i class="far fa-star"></i>
            {% endif %}
        {% else %}
            <i class="far fa-star rating-input" data-value="{{ forloop.counter }}"></i>
        {% endif %}
    {% endfor %}
</div>

<style>
    .rating-stars {
        display: inline-flex;
        gap: 2px;
        color: #ffc107;
    }
    
    .rating-stars.small i {
        font-size: 12px;
    }
    
    .rating-stars.medium i {
        font-size: 16px;
    }
    
    .rating-stars.large i {
        font-size: 20px;
    }
    
    .rating-stars .rating-input {
        cursor: pointer;
        transition: color 0.2s;
    }
    
    .rating-stars .rating-input:hover,
    .rating-stars .rating-input:hover ~ .rating-input {
        color: #ffc107;
    }
    
    .rating-stars[data-rating] .rating-input {
        cursor: default;
    }
</style>

<script>
    // Initialize interactive rating stars
    document.querySelectorAll('.rating-stars:not([data-rating])').forEach(container => {
        const stars = container.querySelectorAll('.rating-input');
        const hiddenInput = container.nextElementSibling?.tagName === 'INPUT' ? 
                           container.nextElementSibling : null;
        
        stars.forEach(star => {
            star.addEventListener('mouseover', function() {
                const value = this.dataset.value;
                highlightStars(container, value);
            });
            
            star.addEventListener('mouseout', function() {
                resetStars(container);
            });
            
            star.addEventListener('click', function() {
                const value = this.dataset.value;
                setRating(container, value);
                if (hiddenInput) {
                    hiddenInput.value = value;
                }
            });
        });
    });
    
    function highlightStars(container, value) {
        const stars = container.querySelectorAll('.rating-input');
        stars.forEach((star, index) => {
            if (index < value) {
                star.classList.remove('far');
                star.classList.add('fas');
            } else {
                star.classList.remove('fas');
                star.classList.add('far');
            }
        });
    }
    
    function resetStars(container) {
        const currentRating = container.dataset.currentRating;
        if (currentRating) {
            highlightStars(container, currentRating);
        } else {
            const stars = container.querySelectorAll('.rating-input');
            stars.forEach(star => {
                star.classList.remove('fas');
                star.classList.add('far');
            });
        }
    }
    
    function setRating(container, value) {
        container.dataset.currentRating = value;
        highlightStars(container, value);
    }
</script>
