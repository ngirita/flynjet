<div class="flight-info-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">{{ flight_number }}</h5>
        <span class="badge bg-{{ status_color }}">{{ status }}</span>
    </div>
    
    <div class="route mb-3">
        <div class="d-flex justify-content-between">
            <span class="fw-bold">{{ departure }}</span>
            <i class="fas fa-arrow-right text-muted"></i>
            <span class="fw-bold">{{ arrival }}</span>
        </div>
    </div>
    
    <div class="position-info">
        <p class="mb-1"><i class="fas fa-map-marker-alt me-2"></i>Lat: {{ latitude|default:"--" }}</p>
        <p class="mb-1"><i class="fas fa-map-marker-alt me-2"></i>Lng: {{ longitude|default:"--" }}</p>
        <p class="mb-1"><i class="fas fa-arrow-up me-2"></i>Alt: {{ altitude|default:"--" }} ft</p>
        <p class="mb-1"><i class="fas fa-tachometer-alt me-2"></i>Speed: {{ speed|default:"--" }} kts</p>
    </div>
    
    <div class="progress mt-3">
        <div class="progress-bar" role="progressbar" style="width: {{ progress }}%"></div>
    </div>
</div>
