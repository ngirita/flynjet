{% extends 'base.html' %}
{% load static %}

{% block title %}Thank You - FlynJet{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="fas fa-check-circle fa-5x text-success"></i>
                    </div>
                    <h1 class="display-4 fw-bold mb-3">Thank You!</h1>
                    <p class="lead mb-4">
                        Your message has been sent successfully. Our team will get back to you within 24 hours.
                    </p>
                    <div class="mb-4">
                        <p class="text-muted">
                            In the meantime, you can:
                        </p>
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'core:faq' %}" class="btn btn-outline-primary">
                                <i class="fas fa-question-circle me-2"></i>View FAQ
                            </a>
                            <a href="{% url 'fleet:list' %}" class="btn btn-outline-primary">
                                <i class="fas fa-plane me-2"></i>Browse Fleet
                            </a>
                        </div>
                    </div>
                    <a href="{% url 'core:home' %}" class="btn btn-primary">
                        <i class="fas fa-home me-2"></i>Return Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
