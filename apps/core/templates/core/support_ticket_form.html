{% extends 'base.html' %}
{% load static %}

{% block title %}Create Support Ticket - FlynJet{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-lg-6 mx-auto">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <h1 class="display-5 fw-bold mb-4">Create Support Ticket</h1>
                    
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100">Submit Ticket</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
