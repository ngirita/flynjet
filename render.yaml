services:
  - type: web
    name: flynjet
    runtime: python
    runtimeVersion: 3.11.9
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
    startCommand: gunicorn flynjet.wsgi:application --bind 0.0.0.0:10000
    envVars:
      - key: DEBUG
        value: false
      - key: SITE_URL
        value: https://flynjet.com
      - key: DATABASE_URL
        sync: false